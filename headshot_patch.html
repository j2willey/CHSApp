<!-- ── CHS Staff Headshot Patch ──────────────────────────────────────────────
     Paste this block just before </body> in index.html.
     Works alongside the existing renderStaffOrg / renderStaff functions.
     Photos must be in Firestore: staff/{id}.photo = "https://..."
     Run upload_headshots.py first to push images and set those fields.
──────────────────────────────────────────────────────────────────────────── -->
<style>
  .org-leader-avatar img,
  .org-mem-avatar img,
  .staff-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    border-radius: inherit;
    display: block;
  }
  .org-leader-avatar.has-photo,
  .org-mem-avatar.has-photo,
  .staff-avatar.has-photo {
    padding: 0;
    overflow: hidden;
  }
</style>

<script>
(function() {
  // After staff list renders, replace initials with headshots where available.
  // Called automatically whenever renderStaff() or renderStaffOrg() fires.

  // Abbreviated name: "Matthew Lewis" → "Matthew L.", "Miguel L." → "Miguel L."
  function abbrevName(fullName) {
    if (!fullName) return '';
    const parts = fullName.trim().split(/\s+/);
    if (parts.length < 2) return fullName;
    const last = parts[parts.length - 1];
    // If last part is already an initial (e.g. "L."), keep it; otherwise abbreviate
    const lastAbbrev = last.endsWith('.') ? last : last[0] + '.';
    return parts[0] + ' ' + lastAbbrev;
  }

  function applyPhotos() {
    if (typeof STAFF === 'undefined') return;

    // Primary lookup: abbreviated name → photo URL (avoids initials collisions)
    // e.g. "Matthew L." and "Miguel L." are distinct; "ML" is not.
    const photoByName = {};
    const photoByInitials = {}; // fallback for staff without a name match in DOM
    STAFF.forEach(s => {
      if (!s.photo) return;
      if (s.name) photoByName[abbrevName(s.name)] = s.photo;
      if (s.i)    photoByInitials[s.i] = s.photo;
    });

    // Name-element selector for each avatar type
    const nameSelectors = {
      'org-leader-avatar': '.org-leader-name',
      'org-mem-avatar':    '.org-mem-name',
      'staff-avatar':      '.staff-name',
    };

    document.querySelectorAll(
      '.org-leader-avatar, .org-mem-avatar, .staff-avatar'
    ).forEach(el => {
      if (el.querySelector('img')) return; // already patched

      // Try name-based lookup first (immune to initials collisions)
      let url = null;
      for (const [cls, nameSel] of Object.entries(nameSelectors)) {
        if (el.classList.contains(cls)) {
          const nameEl = el.closest(`.${cls.replace('-avatar', '')}`)?.querySelector(nameSel)
                      ?? el.parentElement?.querySelector(nameSel);
          if (nameEl) {
            url = photoByName[nameEl.textContent.trim()];
          }
          break;
        }
      }

      // Fall back to initials if name lookup found nothing
      if (!url) {
        const initials = el.textContent.trim();
        url = photoByInitials[initials];
      }

      if (!url) return;

      const initials = el.textContent.trim();
      el.classList.add('has-photo');
      const img = document.createElement('img');
      img.src = url;
      img.alt = initials;
      img.onerror = function() {
        el.classList.remove('has-photo');
        el.innerHTML = initials;
      };
      el.innerHTML = '';
      el.appendChild(img);
    });
  }

  // Patch renderStaff and renderStaffOrg so photos apply after every re-render
  function patchRenderFn(name) {
    if (typeof window[name] !== 'function') return;
    const original = window[name];
    window[name] = function(...args) {
      const result = original.apply(this, args);
      requestAnimationFrame(applyPhotos);
      return result;
    };
  }

  // Wait for the app to boot, then patch
  function init() {
    patchRenderFn('renderStaff');
    patchRenderFn('renderStaffOrg');
    patchRenderFn('filterStaff');
    applyPhotos(); // run once immediately in case staff already rendered
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 0);
  }
})();
</script>
